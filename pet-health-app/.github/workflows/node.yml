name: React Build Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x' # Η έκδοση Node που χρησιμοποιείς
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build the React app
      run: npm run build